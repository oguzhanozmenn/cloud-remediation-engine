services:
  localstack:
    image: localstack/localstack:3.2.0
    container_name: localstack-remediation
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs
      - DEBUG=1

  # Yeni eklenen Worker servisi
  remediation-worker:
    build: ./services/remediation-worker
    container_name: worker-container
    depends_on:
      - localstack
    environment:
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_REGION=eu-central-1
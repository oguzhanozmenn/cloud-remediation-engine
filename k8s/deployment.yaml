apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-worker
  labels:
    app: cloud-remediation-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-remediation-engine
  template:
    metadata:
      labels:
        app: cloud-remediation-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: worker
        image: ozii4333/remediation-worker:v1.2
        imagePullPolicy: Always  # İmajda değişiklik yaptıysan her zaman yenisini çekmesi için
        ports:
        - containerPort: 8000
          name: metrics
        env:
        # --- KRİTİK: Logların terminale anında düşmesini sağlar ---
        - name: PYTHONUNBUFFERED
          value: "1"
        # --- SQS ve S3 Endpoint Ayarı ---
        # Eğer LocalStack Kubernetes içinde bir servis ise servis adını yazmalısın.
        # Eğer LocalStack'i direkt Mac üzerinde 'localstack start' ile çalıştırıyorsan bu kalsın.
        - name: AWS_ENDPOINT_URL
          value: "http://host.docker.internal:4566"
        - name: AWS_REGION
          value: "eu-central-1"
        - name: AWS_ACCESS_KEY_ID
          value: "test"
        - name: AWS_SECRET_ACCESS_KEY
          value: "test"
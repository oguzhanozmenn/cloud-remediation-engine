apiVersion: apps/v1
kind: Deployment
metadata:
  name: remediation-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-remediation-engine
  template:
    metadata:
      labels:
        app: cloud-remediation-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: worker
        image: ozii4333/remediation-worker:v1.2
        ports:
        - containerPort: 8000
          name: metrics
        env:
        - name: AWS_ENDPOINT_URL
          value: "http://host.docker.internal:4566"
        - name: AWS_REGION
          value: "eu-central-1"
        - name: AWS_ACCESS_KEY_ID
          value: "test"
        - name: AWS_SECRET_ACCESS_KEY
          value: "test"
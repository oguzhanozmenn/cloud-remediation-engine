apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloud-remediation-monitor
  namespace: monitoring
  labels:
    release: kube-stack # Prometheus'un bunu fark etmesi için EN KRİTİK etiket
spec:
  selector:
    matchLabels:
      app: cloud-remediation-engine # service.yaml'daki label ile aynı olmalı
  endpoints:
  - port: metrics
    interval: 15s